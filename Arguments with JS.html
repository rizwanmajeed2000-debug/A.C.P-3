<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arguments in JavaScript</title>
</head>
<body>
    <p>Sum of Arguments and Math objects</p>
    <p id="demo"></p>
    <script>
        var value = Math.sin(45);
            document.write("Sin 45 is : " + value + "<br>");
            var value1 = Math.cos(45);
            document.write("Cos 45 is : " + value1 + "<br>");
            var value2 = Math.tan(45);
            document.write("Tan 45 is : " + value2 + "<br>");
            function sumALL() {
                var sum = 0;
                for (var i = 0; i < arguments.length; i++) {
                    sum += arguments[i];
                }
                return sum;
            }
            document.getElementById("demo").innerHTML = "The sum of 1, 2, 3, 4 is : " + sumALL(1, 2, 3, 4);
    </script>
</body>
</html>
